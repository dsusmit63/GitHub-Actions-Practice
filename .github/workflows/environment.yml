name: ENV Demo
on:
  push:
    branches: [main]
env:
  APP_NAME: myapp
jobs:
  demo:
    runs-on: ubuntu-latest
  env:
    ENVIRONMENT: staging
  steps:
    - name: Print variables and GitHub context
      env:
        VERSION: 1.0.0
      run: |
        echo "APP Name $APP_NAME"
        echo "Environment $ENVIRONMENT"
        echo "Version $VERSION"
        echo "Commit SHA $GITHUB_SHA"
        echo "Actor $GITHUB_ACTOR"
