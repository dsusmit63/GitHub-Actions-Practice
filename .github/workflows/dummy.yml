---
name: Dummy Workflow

on:
  workflow_dispatch:

jobs:
  print_infos:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
    steps:
      - name: Print OS name
        run: echo "OS is ${{ runner.os }}"
      - name: Print hostname
        run: hostname
      - name: Print current user
        run: whoami
